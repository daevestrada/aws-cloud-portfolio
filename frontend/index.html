<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWS Cost Dashboard — Diego Estrada</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      max-width: 900px;
      margin: 0 auto 2rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f8fafc;
    }

    header p {
      color: #94a3b8;
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    .cards {
      max-width: 900px;
      margin: 0 auto 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .card {
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 1.25rem;
    }

    .card .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 0.5rem;
    }

    .card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #38bdf8;
    }

    .card .sub {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.25rem;
    }

    .section {
      max-width: 900px;
      margin: 0 auto 2rem;
    }

    .section h2 {
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 8px;
      overflow: hidden;
      font-size: 0.875rem;
    }

    th {
      text-align: left;
      padding: 0.75rem 1rem;
      background: #161b27;
      color: #64748b;
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 0.75rem 1rem;
      border-top: 1px solid #2d3748;
      color: #cbd5e1;
    }

    td.amount {
      color: #38bdf8;
      font-variant-numeric: tabular-nums;
    }

    tr:hover td { background: #232938; }

    .status {
      font-size: 0.75rem;
      color: #64748b;
      text-align: center;
      padding: 1rem;
    }

    .error { color: #f87171; }
  </style>
</head>
<body>
  <header>
    <h1>AWS Cost Dashboard</h1>
    <p>Live spend data from AWS Cost Explorer — <span id="last-updated">loading...</span></p>
  </header>

  <div class="cards">
    <div class="card">
      <div class="label">Month-to-Date Total</div>
      <div class="value" id="mtd-total">—</div>
      <div class="sub" id="mtd-month"></div>
    </div>
    <div class="card">
      <div class="label">Days with Activity</div>
      <div class="value" id="active-days">—</div>
      <div class="sub">services with non-zero spend</div>
    </div>
  </div>

  <div class="section">
    <h2>Daily Breakdown</h2>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Service</th>
          <th>Amount (USD)</th>
        </tr>
      </thead>
      <tbody id="daily-table">
        <tr><td colspan="3" class="status">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
